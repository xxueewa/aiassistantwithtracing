version = 0.1

[default]
[default.global.parameters]
stack_name = "langsmith-rag-demo"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities    = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = true
resolve_s3      = true
region          = "us-east-1"
# Override individual params:  sam deploy --parameter-overrides Environment=prod VpcId=vpc-xxx ...
parameter_overrides = "Environment=dev"
